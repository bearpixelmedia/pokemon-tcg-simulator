<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pokémon TCG Simulator</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; max-width: 700px; margin: 0 auto; }
        button { background: #2563eb; color: white; border: none; padding: 16px 32px; font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; max-width: 300px; }
        pre { background: #1e2937; padding: 20px; border-radius: 10px; overflow-x: auto; white-space: pre-wrap; }
        .card { background: #1e2937; padding: 24px; border-radius: 12px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🎴 Pokémon TCG Simulator</h1>
    <p>Modular engine • Status effects • AI simulation</p>
    
    <div class="card">
        <button onclick="runSimulation()">Run AI vs AI Simulation</button>
    </div>
    
    <div class="card">
        <h3>Result</h3>
        <pre id="log">Click the button to start a simulation</pre>
    </div>

    <script>
        async function runSimulation() {
            const log = document.getElementById('log');
            log.textContent = 'Running simulation...';
            
            try {
                const response = await fetch('/run_sim', { method: 'POST' });
                const data = await response.json();
                log.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                log.textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
